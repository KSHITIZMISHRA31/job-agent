spring.application.name=job-agent
# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/jobpilot_ai
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Mongo
spring.data.mongodb.uri=mongodb://localhost:27017/jobpilot_ai
# Logging
logging.level.org.springframework=INFO
# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Gemini
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta
gemini.api.model=gemini-2.5-flash-lite
